datasets:
  contracts:
    type: file
    path: cuad.json

optimizer_config:
  type: moar
  target: cost
  max_iterations: 30
  evaluation_file: eval_cuad.py

operations:
  - name: extract_governing_law
    type: map
    optimize: true
    prompt: "Extract the 'Governing Law' or 'Choice of Law' clause from this contract. If none exists, return 'None'."
    output:
      schema:
        governing_law_clause: "str"

steps:
  - name: process_contracts
    input: contracts
    operations: [extract_governing_law]