default_model: openai/gpt-4o-mini
bypass_cache: false

datasets:
  articles:
    type: file
    path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/data/test/blackvault.json

operations:
  - name: extract_event_type
    type: map
    litellm_completion_kwargs:
      temperature: 0.0
    prompt: |
      Read the Black Vault article below and classify the primary reported event.

      Return exactly one concise event type label (for example: "humanoid sighting",
      "ufo sighting", "alien abduction", "crop circle", "haunting", "none").

      If no concrete event is described, return "none".

      Article:
      {{ input.all_content }}
    output:
      schema:
        event_type: str

  - name: collect_distinct_locations_by_event_type
    type: reduce
    reduce_key: event_type
    litellm_completion_kwargs:
      temperature: 0.0
    prompt: |
      You are given multiple articles that all share this event type: "{{ reduce_key }}".

      Extract all distinct real-world locations mentioned across the articles.
      Normalize duplicates (for example, "NYC" and "New York City" should become one entry).
      Exclude vague references (for example, "nearby area", "unknown location").

      Articles:
      {% for report in inputs %}
      ---
      {{ report.all_content }}
      {% endfor %}
    output:
      schema:
        event_type: str
        locations: list[str]

pipeline:
  steps:
    - name: black_vault_event_location_pipeline
      input: articles
      operations:
        - extract_event_type
        - collect_distinct_locations_by_event_type
  output:
    type: file
    path: moar_experiments/reproduce_moar/black_vault/blk_vlt_results.json