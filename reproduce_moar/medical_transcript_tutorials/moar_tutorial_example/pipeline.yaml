datasets:
  transcripts:
    path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/medical_transcripts.json # workloads/medical/raw.json
    type: file

default_model: openai/gpt-4o-mini
bypass_cache: false
litellm_settings:
  global_disable_no_log_param: True
  
optimizer_config:
  type: moar
  dataset_path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/raw_sample.json #workloads/medical/raw_sample.json  # Use sample for faster optimization
  save_dir: ./moar_results
  available_models:  # LiteLLM model names - ensure API keys are set in your environment
    - openai/gpt-5.1-mini
    - openai/gpt-4o-mini
  evaluation_file: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/evaluation_medications.py #workloads/medical/evaluate_medications.py
  metric_key: medication_extraction_score
  max_iterations: 40
  model: openai/gpt-4o-mini
  rewrite_agent_model: openai/gpt-4o-mini
  # itellm_params:
  #   model: openai/gpt-5.1-nano
  #   api_key: ${OPENAI_API_KEY}
    
  # Ensure this environment variable is set with your OpenAI API key
  # model_list:
  # - model_name: gpt-3.5-turbo
  #   litellm_params:
  #     model: openai/gpt-3.5-turbo                          # The `openai/` prefix will call openai.chat.completions.create
  #     api_key: os.environ/OPENAI_API_KEY
  # - model_name: gpt-3.5-turbo-instruct
  #   litellm_params:
  #     model: text-completion-openai/gpt-3.5-turbo-instruct # The `text-completion-openai/` prefix will call openai.completions.create
  #     api_key: os.environ/OPENAI_API_KEY

system_prompt:
  dataset_description: a collection of transcripts of doctor visits
  persona: a medical practitioner analyzing patient symptoms and reactions to medications

operations:
  - name: extract_medications
    type: map
    output:
      schema:
        medication: list[str]
    prompt: |
      Analyze the following transcript of a conversation between a doctor and a patient:
      {{ input.src }}
      Extract and list all medications mentioned in the transcript.
      If no medications are mentioned, return an empty list.

pipeline:
  steps:
    - name: medication_extraction
      input: transcripts
      operations:
        - extract_medications
  output:
    type: file
    path: ./extracted_medications_results.json