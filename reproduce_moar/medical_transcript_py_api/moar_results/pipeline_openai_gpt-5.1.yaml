datasets:
  transcripts:
    path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/raw_sample.json
    type: file
default_model: openai/gpt-5.1
bypass_cache: false
optimizer_config:
  type: moar
  dataset_path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/raw_sample.json
  save_dir: ./moar_results
  available_models:
  - openai/gpt-5.1-nano
  - openai/gpt-5.1-mini
  - openai/gpt-5.1
  - openai/gpt-4o
  - openai/gpt-4o-mini
  evaluation_file: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/evaluation_medications.py
  metric_key: medication_extraction_score
  max_iterations: 40
  model: openai/gpt-5.1-nano
  itellm_params:
    model: openai/gpt-5.1-nano
    api_key: ${OPENAI_API_KEY}
system_prompt:
  dataset_description: a collection of transcripts of doctor visits
  persona: a medical practitioner analyzing patient symptoms and reactions to medications
operations:
- name: extract_medications
  type: map
  output:
    schema:
      medication: list[str]
  prompt: 'Analyze the following transcript of a conversation between a doctor and
    a patient:

    {{ input.src }}

    Extract and list all medications mentioned in the transcript.

    If no medications are mentioned, return an empty list.

    '
pipeline:
  steps:
  - name: medication_extraction
    input: transcripts
    operations:
    - extract_medications
  output:
    type: file
    path: /Users/yilunli/Desktop/moar_experiments/moar_experiments/reproduce_moar/medical_transcript_py_api/moar_results/pipeline_openai_gpt-5.1.json
